<style>
  :root {
    --burgundy: #4B0F0F;
    --burgundy-dark: #2D0808;
    --cream: #FAF5EE;
    --cream-dark: #F0E8DC;
    --gold: #C5A55A;
    --text-dark: #1A0A0A;
    --text-mid: #4A2A2A;
    --text-light: #8A6A6A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--text-dark); }

  nav {
    position: sticky; top: 0; z-index: 100;

    padding: 0 40px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;

  .nav-logo { font-family: 'Noto Serif KR', serif; font-size: 15px; color: var(--cream); text-decoration: none; }
  .nav-logo span { color: var(--gold); font-size: 10px; display: block; letter-spacing: 0.1em; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; }
  .nav-back { font-size: 13px; color: rgba(250,245,238,0.6); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--gold); }

  .page-header {
    background: var(--burgundy-dark);

  }
  .page-label { font-size: 10px; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
  .page-title { font-family: 'Noto Serif KR', serif; font-size: clamp(28px,4vw,44px); color: var(--cream); font-weight: 700; margin-bottom: 16px; }
  .page-sub { font-size: 14px; color: rgba(250,245,238,0.5); font-weight: 300; line-height: 1.8; max-width: 500px; margin: 0 auto; }

  .filter-bar {
    padding: 32px 40px;
    display: flex; gap: 12px; flex-wrap: wrap;
    max-width: 1100px; margin: 0 auto;
    border-bottom: 1px solid var(--cream-dark);
  }
  .filter-btn {
    background: none; border: 1px solid var(--cream-dark);
    padding: 8px 20px; font-size: 12px; letter-spacing: 0.1em;
    color: var(--text-light); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--burgundy); border-color: var(--burgundy); color: var(--cream);
  }

  /* 리스트형 레이아웃 */
  .insight-list {
    max-width: 1100px; margin: 0 auto;
    padding: 48px 40px 100px;
  }

  .insight-item {
    display: flex; align-items: flex-start; gap: 32px;
    padding: 32px 0; border-bottom: 1px solid var(--cream-dark);
    text-decoration: none; color: inherit;
    transition: all 0.2s;
  }
  .insight-item:first-child { border-top: 1px solid var(--text-dark); }
  .insight-item:hover .insight-title { color: var(--burgundy); }
  .insight-item:hover .insight-arrow { transform: translateX(4px); color: var(--burgundy); }

  .insight-meta {
    flex-shrink: 0; width: 100px;
    padding-top: 4px;
  }
  .insight-date { font-size: 11px; color: var(--text-light); display: block; margin-bottom: 8px; letter-spacing: 0.05em; }
  .insight-tag {
    display: inline-block;
    font-size: 9px; letter-spacing: 0.15em;
    background: var(--burgundy); color: var(--cream);
    padding: 3px 8px; text-transform: uppercase;
  }

  .insight-body { flex: 1; }
  .insight-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px; color: var(--text-dark);
    font-weight: 700; margin-bottom: 10px; line-height: 1.5;
    transition: color 0.2s;
  }
  .insight-desc {
    font-size: 13px; color: var(--text-light);
    line-height: 1.8; font-weight: 300;
  }

  .insight-arrow {
    flex-shrink: 0; font-size: 20px;
    color: var(--cream-dark); transition: all 0.2s;
    padding-top: 4px;
  }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .page-header { padding: 60px 24px 40px; }
    .filter-bar { padding: 24px 20px; }
    .insight-list { padding: 32px 20px 60px; }
    .insight-item { flex-wrap: wrap; gap: 16px; }
    .insight-meta { width: auto; display: flex; gap: 12px; align-items: center; }
    .insight-arrow { display: none; }
  }
</style>
</head>
